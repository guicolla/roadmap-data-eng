version: "3.8"

services:
  # === POSTGRESQL ===
  postgres:
    image: postgres:15-alpine
    container_name: spotify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dataeng}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dataeng123}
      POSTGRES_DB: ${DB_NAME:-spotify}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spotify-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dataeng}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === PGADMIN ===
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spotify-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    networks:
      - spotify-net
    depends_on:
      postgres:
        condition: service_healthy

  # === ETL (Python) ===
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotify-etl
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-dataeng}
      DB_PASSWORD: ${DB_PASSWORD:-dataeng123}
      DB_NAME: ${DB_NAME:-spotify}
    volumes:
      - ./dados:/app/dados
    networks:
      - spotify-net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: spotify-pgdata

networks:
  spotify-net:
    name: spotify-network
